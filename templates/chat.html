<!DOCTYPE html>
<html>
<head>
    <title>MOKSHFIT AI Assistant</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    
    <style>
        .product_img_chat {
            max-width: 250px;
            height: auto;
            border-radius: 15px;
            border: 2px solid #78e08f;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            margin-top: 5px;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .product_img_chat:hover {
            transform: scale(1.03);
        }
        .msg_cotainer_img {
            background: none !important;
            border: none !important;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .shop-btn {
            border-radius: 20px;
            color: white !important;
            border-color: #764ba2 !important;
            background: #764ba2;
            font-size: 12px;
            padding: 5px 15px;
            margin-top: 8px;
            transition: 0.3s;
        }
        .shop-btn:hover {
            background: #667eea;
            border-color: #667eea !important;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>MOKSHFIT</span>
                                <p>SHUBH SWAGATAM !!!!</p>
                            </div>
                        </div>
                    </div>

                    <div id="messageFormeight" class="card-body msg_card_body"></div>

                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Ask about hoodies, t-shirts, or orders..." autocomplete="off" class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    $(document).ready(function() {

        function scrollToBottom() {
            var messageBody = document.getElementById("messageFormeight");
            messageBody.scrollTop = messageBody.scrollHeight;
        }

        $("#messageArea").on("submit", function(event) {

            const date = new Date();
            const str_time = date.getHours() + ":" + date.getMinutes().toString().padStart(2, '0');

            var rawText = $("#text").val();

            var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">'
            + rawText +
            '<span class="msg_time_send">' + str_time +
            '</span></div><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="rounded-circle user_img_msg"></div></div>';

            $("#text").val("");
            $("#messageFormeight").append(userHtml);

            scrollToBottom();

            $.ajax({
                data: { msg: rawText },
                type: "POST",
                url: "/get",
            }).done(function(data) {

                var botHtml =
                '<div class="d-flex justify-content-start mb-4">' +
                '<div class="img_cont_msg">' +
                '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">' +
                '</div>' +
                '<div class="msg_cotainer">' +
                data.answer +
                '<span class="msg_time">' + str_time + '</span>' +
                '</div></div>';

                if (data.image) {

                    botHtml += `
                    <div class="d-flex justify-content-start mb-4">

                        <div class="img_cont_msg" style="visibility:hidden">
                            <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">
                        </div>

                        <div class="msg_cotainer_img">

                            ${data.title ? `<div style="font-weight:500;margin-bottom:6px">${data.title}</div>` : ""}

                            <a href="${data.image}" target="_blank">
                                <img src="${data.image}" class="product_img_chat">
                            </a>

                            ${data.url ? `<a href="${data.url}" target="_blank" class="btn btn-sm shop-btn">View on Store</a>` : ""}

                        </div>

                    </div>
                    `
                }

                $("#messageFormeight").append(botHtml)

                scrollToBottom()

            });

            event.preventDefault();
        });
    });
    </script>
</body>
</html>
